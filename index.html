<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>숫자 탭 게임</title>
<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #e8e8e5;
  --text: #1a1a1a; --text2: #666660;
  --border: rgba(0,0,0,0.13); --border2: rgba(0,0,0,0.22);
  --active-bg: #eef4ff; --active-border: #185fa5; --active-text: #185fa5;
  --done-bg: #eaf3de; --done-border: rgba(59,109,17,0.3); --done-text: #27500a;
  --danger: #e24b4a; --info: #185fa5;
  --gold: #ba7517; --radius: 12px; --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
    --text: #f2f2f7; --text2: #8e8e93;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --active-bg: #0c2a4a; --active-border: #64a8f0; --active-text: #64a8f0;
    --done-bg: #173404; --done-border: rgba(150,210,80,0.25); --done-text: #c0dd97;
    --danger: #ff6b6b; --info: #64a8f0; --gold: #f0a500;
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overscroll-behavior: none;
}
#app { max-width: 420px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

.btn-primary {
  display: block; width: 100%; padding: 14px;
  font-size: 16px; font-weight: 600; border-radius: var(--radius-sm);
  border: none; background: var(--text); color: var(--bg);
  cursor: pointer; touch-action: manipulation;
}
.btn-primary:active { opacity: 0.75; transform: scale(0.98); }
.btn-secondary {
  display: block; width: 100%; padding: 13px;
  font-size: 15px; font-weight: 500; border-radius: var(--radius-sm);
  border: 0.5px solid var(--border2); background: var(--bg); color: var(--text);
  cursor: pointer; touch-action: manipulation;
}
.btn-secondary:active { background: var(--bg3); }

/* ══ 화면 1: 닉네임 ══ */
#screen-nick {
  display: flex; flex-direction: column; align-items: center;
  padding-top: 3.5rem;
}
.game-title { font-size: 28px; font-weight: 700; margin-bottom: 6px; text-align: center; }
.game-sub   { font-size: 14px; color: var(--text2); margin-bottom: 2.5rem; text-align: center; line-height: 1.6; }
#nick-input {
  width: 100%; max-width: 300px; font-size: 17px;
  padding: 12px 14px; margin-bottom: 14px;
  border-radius: var(--radius-sm); border: 0.5px solid var(--border2);
  background: var(--bg); color: var(--text); outline: none; -webkit-appearance: none;
}
#nick-input:focus { border-color: var(--info); box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
#nick-ok { max-width: 300px; }

/* ══ 화면 2: 게임 ══ */
#screen-game { display: none; }

#header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;
}
#nick-badge {
  flex: 1; font-size: 14px; color: var(--text2); font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#timer-wrap {
  display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0;
}
#timer {
  font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums;
  line-height: 1; color: var(--text);
}
#timer.urgent { color: var(--danger); }
#timer-label { font-size: 11px; color: var(--text2); margin-top: 1px; }

#score-wrap {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg2); border-radius: var(--radius-sm);
  padding: 10px 16px; margin-bottom: 1rem;
}
#score-wrap .s-label { font-size: 13px; color: var(--text2); }
#score-wrap .s-val   { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
#next-hint { font-size: 13px; color: var(--text2); }
#next-hint span { color: var(--active-text); font-weight: 700; font-size: 16px; }

#start-btn {
  display: block; width: 100%; padding: 14px;
  font-size: 16px; font-weight: 600; border-radius: var(--radius-sm);
  border: none; background: var(--text); color: var(--bg);
  cursor: pointer; touch-action: manipulation; margin-bottom: 1rem;
}
#start-btn:active { opacity: 0.75; }
#start-btn:disabled { opacity: 0.35; }

#countdown {
  height: 72px; display: flex; align-items: center; justify-content: center;
  font-size: 58px; font-weight: 700;
}

#grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }

.card {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700;
  border-radius: var(--radius); border: 0.5px solid var(--border2);
  background: var(--bg); color: var(--text);
  user-select: none; -webkit-user-select: none;
  touch-action: manipulation; cursor: default;
  transition: transform 0.08s, background 0.08s;
}
.card.active {
  background: var(--bg);
  border: 0.5px solid var(--border2);
  color: var(--text);
  cursor: pointer;
}
.card.active:active { transform: scale(0.91); }
.card.done {
  background: var(--done-bg);
  border-color: var(--done-border);
  color: var(--done-text);
  font-size: 24px;
}
.card.wrong { animation: shake .35s; }
@keyframes shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}  60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
}

/* ══ 화면 3: 결과 팝업 ══ */
#screen-result {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 200;
  align-items: flex-end; justify-content: center;
}
#screen-result.show { display: flex; }
#result-sheet {
  background: var(--bg); width: 100%; max-width: 480px;
  border-radius: 20px 20px 0 0;
  padding: 1.5rem 1.25rem 2.5rem;
  max-height: 92vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.result-my { text-align: center; padding-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; }
.result-my .r-lbl  { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.result-my .r-name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.result-my .r-score { font-size: 52px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.result-my .r-score-label { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.result-my .r-rank { font-size: 14px; color: var(--text2); }
.result-my .r-rank strong { color: var(--info); font-size: 20px; }

.lb-header { font-size: 13px; font-weight: 600; color: var(--text2); text-align: center; margin-bottom: 0.75rem; }
.lb-row { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 0.5px solid var(--border); font-size: 15px; }
.lb-row:last-child { border-bottom: none; }
.lb-rank { width: 28px; text-align: center; font-weight: 700; color: var(--text2); flex-shrink: 0; font-size: 14px; }
.lb-rank.gold   { font-size: 20px; }
.lb-rank.silver { font-size: 20px; }
.lb-rank.bronze { font-size: 20px; }
.lb-name  { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-score { font-weight: 700; color: var(--text); min-width: 48px; text-align: right; }
.lb-row.me { background: rgba(24,95,165,0.07); border-radius: 8px; margin: 2px -4px; padding: 8px 8px; }
.lb-row.me .lb-name, .lb-row.me .lb-score { color: var(--info); }
.lb-row.me .lb-rank { color: var(--info); }

#lb-loading { text-align: center; padding: 1.5rem 0; font-size: 14px; color: var(--text2); }
.result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 1.5rem; }
#credit {
  position: fixed; bottom: 14px; right: 16px;
  font-size: 11px; color: var(--text2); opacity: 0.6;
  pointer-events: none; z-index: 10;
}
</style>
</head>
<body>
<div id="app">

  <!-- 화면 1: 닉네임 입력 -->
  <div id="screen-nick">
    <div class="game-title">숫자 탭 게임</div>
    <div class="game-sub">15초 안에 최대한 많은 숫자를<br>순서대로 눌러보세요</div>
    <input id="nick-input" type="text" maxlength="12" placeholder="닉네임 입력 (최대 12자)"
      autocomplete="off" autocorrect="off" spellcheck="false" />
    <button id="nick-ok" class="btn-primary">시작하기</button>
  </div>

  <!-- 화면 2: 게임 -->
  <div id="screen-game">
    <div id="header">
      <span id="nick-badge"></span>
      <div id="timer-wrap">
        <div id="timer">15</div>
        <div id="timer-label">남은 시간</div>
      </div>
    </div>
    <div id="score-wrap">
      <div>
        <div class="s-label">현재 점수</div>
        <div class="s-val" id="score-disp">0</div>
      </div>
      <div id="next-hint">다음 숫자 <span id="next-num">1</span></div>
    </div>
    <button id="start-btn">시작</button>
    <div id="countdown"></div>
    <div id="grid"></div>
  </div>

</div>

<!-- 화면 3: 결과 팝업 -->
<div id="screen-result">
  <div id="result-sheet">
    <div class="result-my">
      <div class="r-lbl">최종 점수</div>
      <div class="r-name" id="r-name"></div>
      <div class="r-score" id="r-score">0</div>
      <div class="r-score-label">개</div>
      <div class="r-rank" id="r-rank"></div>
    </div>
    <div class="lb-header">랭킹 TOP 10</div>
    <div id="lb-loading">불러오는 중...</div>
    <div id="lb-rows"></div>
    <div class="result-actions">
      <button id="btn-again" class="btn-primary">같은 닉네임으로 다시 도전</button>
      <button id="btn-new"   class="btn-secondary">닉네임 변경 후 다시 시작</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   🔧 Firebase 설정을 여기에 입력하세요
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const firebaseConfig = {
  apiKey: "AIzaSyDVrf8vbtBHJYD93EhXosITNmgym80GOMw",
  authDomain: "numberupgame.firebaseapp.com",
  databaseURL: "https://numberupgame-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "numberupgame",
  storageBucket: "numberupgame.firebasestorage.app",
  messagingSenderId: "209419310847",
  appId: "1:209419310847:web:916c8f6fc0a730b8191eca"
};
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

window.fbSave = async (name, score) => {
  await push(ref(db, 'scores'), { name, score, t: Date.now() });
};

window.fbLoadTop10 = async () => {
  const snap = await get(ref(db, 'scores'));
  if (!snap.exists()) return [];
  const rows = Object.values(snap.val());
  rows.sort((a, b) => b.score - a.score);
  return rows.slice(0, 10);
};
</script>

<script>
const $ = id => document.getElementById(id);

let nickname   = '';
let cells      = [];   // [{ el, num }] — 9칸 고정
let nextExp    = 1;    // 다음에 눌러야 할 숫자
let score      = 0;    // 맞게 누른 횟수
let timeLeft   = 15;
let timerInt   = null;
let gameActive = false;

/* ── 유틸 ── */
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ── 화면 전환 ── */
function showNick() {
  $('screen-nick').style.display = 'flex';
  $('screen-game').style.display = 'none';
  $('screen-result').classList.remove('show');
  $('nick-input').value = '';
  setTimeout(() => $('nick-input').focus(), 100);
}
function showGame() {
  $('screen-nick').style.display = 'none';
  $('screen-game').style.display = 'block';
  $('screen-result').classList.remove('show');
}
function showResult() {
  $('screen-result').classList.add('show');
}

/* ── 닉네임 ── */
$('nick-ok').addEventListener('click', () => {
  const v = $('nick-input').value.trim();
  if (!v) { $('nick-input').focus(); return; }
  nickname = v;
  $('nick-badge').textContent = nickname;
  showGame();
  resetGame();
});
$('nick-input').addEventListener('keydown', e => { if (e.key === 'Enter') $('nick-ok').click(); });

/* ── 그리드 초기화 ── */
function buildGrid() {
  const grid = $('grid');
  grid.innerHTML = '';
  cells = [];

  // 1~9 를 섞어서 9칸에 배치
  const nums = shuffle([1,2,3,4,5,6,7,8,9]);
  nums.forEach((n, idx) => {
    const d = document.createElement('div');
    d.className = 'card';
    d.textContent = n;
    const tap = e => { e.preventDefault(); onCard(idx); };
    d.addEventListener('touchend', tap, { passive: false });
    d.addEventListener('click', tap);
    grid.appendChild(d);
    cells.push({ el: d, num: n });
  });
  updateActiveCard();
}

function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ── 활성 카드 표시 갱신 ── */
function updateActiveCard() {
  cells.forEach(c => {
    c.el.classList.remove('active', 'done');
    if (c.num < nextExp) c.el.classList.add('done');
    if (c.num === nextExp) c.el.classList.add('active');
  });
  $('next-num').textContent = nextExp;
}

/* ── 카드 탭 ── */
function onCard(idx) {
  if (!gameActive) return;
  const cell = cells[idx];

  if (cell.num !== nextExp) {
    // 틀림 → 흔들림만
    cell.el.classList.add('wrong');
    setTimeout(() => cell.el.classList.remove('wrong'), 350);
    return;
  }

  // 맞음
  score++;
  $('score-disp').textContent = score;

  // 해당 칸을 nextExp + 9 로 교체
  const newNum = nextExp + 9;
  cell.num = newNum;
  cell.el.textContent = newNum;

  nextExp++;

  // 나머지 칸(완료된 칸 제외) 위치 무작위로 섞기
  const activeIndices = cells
    .map((c, i) => ({ c, i }))
    .filter(({ c }) => c.num >= nextExp);
  const shuffledNums = shuffle(activeIndices.map(({ c }) => c.num));
  activeIndices.forEach(({ i }, j) => {
    cells[i].num = shuffledNums[j];
    cells[i].el.textContent = shuffledNums[j];
  });

  updateActiveCard();
}

/* ── 타이머 ── */
function startTimer() {
  timeLeft = 15;
  $('timer').textContent = timeLeft;
  $('timer').classList.remove('urgent');
  timerInt = setInterval(() => {
    timeLeft--;
    $('timer').textContent = timeLeft;
    if (timeLeft <= 5) $('timer').classList.add('urgent');
    if (timeLeft <= 0) endGame();
  }, 1000);
}
function stopTimer() { clearInterval(timerInt); timerInt = null; }

/* ── 게임 리셋 ── */
function resetGame() {
  stopTimer();
  nextExp = 1; score = 0; gameActive = false;
  timeLeft = 15;
  $('timer').textContent = '15';
  $('timer').classList.remove('urgent');
  $('score-disp').textContent = '0';
  $('next-num').textContent = '1';
  $('countdown').textContent = '';
  $('start-btn').style.display = 'block';
  $('start-btn').disabled = false;
  buildGrid();
}

/* ── 게임 시작 ── */
async function startGame() {
  $('start-btn').disabled = true;
  $('start-btn').style.display = 'none';
  nextExp = 1; score = 0;
  $('score-disp').textContent = '0';
  buildGrid();

  const cd = $('countdown');
  for (const s of ['3','2','1','시작!']) {
    cd.textContent = s;
    await delay(s === '시작!' ? 700 : 820);
  }
  cd.textContent = '';

  gameActive = true;
  startTimer();
}

/* ── 게임 종료 ── */
async function endGame() {
  stopTimer();
  gameActive = false;
  const finalScore = score;

  $('r-name').textContent  = nickname;
  $('r-score').textContent = finalScore;
  $('r-rank').textContent  = '';
  $('lb-rows').innerHTML   = '';
  $('lb-loading').style.display = 'block';
  $('lb-loading').textContent   = '기록 저장 중...';
  showResult();

  try {
    await window.fbSave(nickname, finalScore);
    $('lb-loading').textContent = '랭킹 불러오는 중...';
    const top10 = await window.fbLoadTop10();
    $('lb-loading').style.display = 'none';
    renderRanking(top10, nickname, finalScore);
  } catch(e) {
    console.error(e);
    $('lb-loading').textContent = '네트워크 오류 — 랭킹을 불러올 수 없습니다';
  }
}

/* ── 랭킹 렌더링 ── */
function renderRanking(rows, myName, myScore) {
  if (!rows || rows.length === 0) {
    $('lb-rows').innerHTML = '<div style="text-align:center;padding:1rem;color:var(--text2);font-size:14px;">아직 기록이 없습니다</div>';
    return;
  }
  const medals     = ['🥇','🥈','🥉'];
  const rankClasses = ['gold','silver','bronze'];
  let myRank = -1;

  const html = rows.map((r, i) => {
    const isMe = r.name === myName && r.score === myScore;
    if (isMe && myRank < 0) myRank = i + 1;
    const rankLabel = i < 3 ? medals[i] : (i + 1);
    const rankCls   = i < 3 ? rankClasses[i] : '';
    return `<div class="lb-row${isMe ? ' me' : ''}">
      <span class="lb-rank ${rankCls}">${rankLabel}</span>
      <span class="lb-name">${r.name}</span>
      <span class="lb-score">${r.score}개</span>
    </div>`;
  }).join('');

  $('lb-rows').innerHTML = html;

  if (myRank > 0) {
    $('r-rank').innerHTML = `<strong>${myRank}위</strong> / ${rows.length}명`;
  } else {
    $('r-rank').innerHTML = `10위권 밖`;
  }
}

/* ── 버튼 이벤트 ── */
$('start-btn').addEventListener('click', startGame);
$('btn-again').addEventListener('click', () => {
  $('screen-result').classList.remove('show');
  showGame();
  resetGame();
});
$('btn-new').addEventListener('click', () => { showNick(); });
</script>
<div id="credit">제작: 2026KISHYONGT</div>
</body>
</html>
